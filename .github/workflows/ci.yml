name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 -timeout 120s ./...

      - name: Coverage gate (≥70%)
        run: make coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

      - name: Build examples
        run: go build ./examples/...

      - name: Security scan (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -confidence medium \
            -exclude-generated \
            -fmt sarif \
            -out gosec-results.sarif \
            ./... || true

      - name: Upload gosec SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
          category: gosec
        continue-on-error: true

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Benchmarks
        run: go test -bench=. -benchmem -timeout 120s ./internal/primitives/

  bench-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run baseline benchmarks
        run: go test -bench=. -benchmem -count=5 -timeout 300s ./internal/primitives/ > baseline.txt

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline
          path: baseline.txt
          retention-days: 90

  bench-compare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download baseline from main
        id: baseline
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: ci.yml
          branch: main
          name: bench-baseline
          path: baseline

      - name: Run PR benchmarks
        run: go test -bench=. -benchmem -count=5 -timeout 300s ./internal/primitives/ > pr.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare with baseline
        if: steps.baseline.outcome == 'success'
        run: |
          "$(go env GOPATH)/bin/benchstat" -delta-test none baseline/baseline.txt pr.txt > comparison.txt
          cat comparison.txt

      - name: No baseline available
        if: steps.baseline.outcome != 'success'
        run: |
          echo "No benchmark baseline artifact found on main; skipping regression gate."
          echo "No benchmark baseline artifact found on main; skipping regression gate." > comparison.txt

      - name: Fail on >20% benchmark regression
        if: steps.baseline.outcome == 'success'
        run: |
          if grep -E '\+[2-9][0-9](\.[0-9]+)?%|\+[1-9][0-9]{2,}(\.[0-9]+)?%' comparison.txt; then
            echo "REGRESSION DETECTED: one or more benchmarks degraded by >20%"
            exit 1
          fi

      - name: Upload benchmark comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-comparison
          path: comparison.txt
          retention-days: 14

      - name: Comment comparison on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comparison.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Benchmark Comparison\n\`\`\`\n${body}\n\`\`\``
            });
