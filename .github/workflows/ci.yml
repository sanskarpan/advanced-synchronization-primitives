name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 -timeout 120s ./...

      - name: Coverage gate (≥70%)
        run: make coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

      - name: Build examples
        run: go build ./examples/...

      - name: Security scan (gosec)
        uses: securego/gosec@v2.25.0
        with:
          args: >-
            -no-fail
            -severity medium
            -confidence medium
            -exclude-generated
            -fmt sarif
            -out gosec-results.sarif
            ./...

      - name: Upload gosec SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gosec-results.sarif
          category: gosec
        continue-on-error: true

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Benchmarks
        run: go test -bench=. -benchmem -timeout 120s ./internal/primitives/

  bench-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Run baseline benchmarks
        run: go test -bench=. -benchmem -count=5 -timeout 300s ./internal/primitives/ > baseline.txt

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v7
        with:
          name: bench-baseline
          path: baseline.txt
          retention-days: 90

  bench-compare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      BENCHSTAT_VERSION: v0.0.0-20260409210113-8e83ce0f7b1c
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Download baseline from main
        id: baseline
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: ci.yml
          branch: main
          name: bench-baseline
          path: baseline

      - name: Run PR benchmarks
        run: go test -bench=. -benchmem -count=5 -timeout 300s ./internal/primitives/ > pr.txt

      - name: Install benchstat
        id: install_benchstat
        continue-on-error: true
        run: go install golang.org/x/perf/cmd/benchstat@${BENCHSTAT_VERSION}

      - name: Compare with baseline
        id: compare
        if: steps.baseline.outcome == 'success' && steps.install_benchstat.outcome == 'success'
        continue-on-error: true
        run: |
          "$(go env GOPATH)/bin/benchstat" baseline/baseline.txt pr.txt > comparison.txt
          cat comparison.txt

      - name: No baseline available
        if: steps.baseline.outcome != 'success'
        run: |
          echo "No benchmark baseline artifact found on main; skipping regression gate."
          echo "No benchmark baseline artifact found on main; benchmark comparison skipped." > comparison.txt

      - name: Benchstat unavailable
        if: steps.baseline.outcome == 'success' && steps.install_benchstat.outcome != 'success'
        run: |
          echo "benchstat installation failed; benchmark comparison skipped." > comparison.txt

      - name: Bench comparison unavailable
        if: steps.baseline.outcome == 'success' && steps.install_benchstat.outcome == 'success' && steps.compare.outcome != 'success'
        run: |
          echo "benchstat comparison step failed; benchmark comparison skipped." > comparison.txt

      - name: Benchmark regression signal (non-blocking)
        if: steps.compare.outcome == 'success'
        run: |
          if grep -E '\+[2-9][0-9](\.[0-9]+)?%|\+[1-9][0-9]{2,}(\.[0-9]+)?%' comparison.txt; then
            echo "::warning::Benchmark regression signal detected (>20%). See benchmark-comparison artifact and PR comment."
          fi

      - name: Upload benchmark comparison
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-comparison
          path: comparison.txt
          retention-days: 14

      - name: Comment comparison on PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- benchmark-comparison-comment -->';
            const body = fs.existsSync('comparison.txt')
              ? fs.readFileSync('comparison.txt', 'utf8')
              : 'Benchmark comparison output not found.';
            const commentBody = `${marker}\n## Benchmark Comparison\n\`\`\`\n${body}\n\`\`\``;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody
              });
            }
